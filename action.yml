name: 'PR Welcome Comment'
description: 'Automatically post a customizable welcome and guidance comment on pull requests.'
author: 'Atliac'
inputs:
  github-token:
    description: 'The GitHub token to use for API requests.'
    required: false
    default: ${{ github.token }}
  custom-message:
    description: 'An optional custom Markdown message to post. You can use {{prNumber}} and {{baseBranch}} as placeholders.'
    required: false
    default: ''
branding:
  icon: 'message-square'
  color: 'purple'
runs:
  using: 'composite'
  steps:
    - name: Post guidance comment
      uses: actions/github-script@v7
      env:
        CUSTOM_MESSAGE: ${{ inputs.custom-message }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = require('path');

          const token = process.env.GITHUB_TOKEN;
          if (!token) {
            throw new Error('No GitHub token provided. Set github-token input or ensure the default is available.');
          }

          if (!context.payload.pull_request) {
            console.log('Not a pull request event. Skipping.');
            return;
          }

          const prNumber = context.issue.number;
          const baseBranch = context.payload.pull_request.base.ref;

          let commentBody = process.env.CUSTOM_MESSAGE;

          if (!commentBody) {
            try {
              const defaultTemplatePath = path.join(process.env.ACTION_PATH, 'default-message.md');
              commentBody = fs.readFileSync(defaultTemplatePath, 'utf8');
            } catch (error) {
              throw new Error(`Failed to read default welcome message file: ${error.message}`);
            }
          }

          // Replace placeholders in the message template
          commentBody = commentBody
            .replace(/\{\{prNumber\}\}/g, prNumber)
            .replace(/\{\{baseBranch\}\}/g, baseBranch);

          try {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
          } catch (error) {
            if (error.status === 403 && error.message.includes('rate limit')) {
              console.warn('Rate limited. The welcome comment will not be posted on this run.');
              return;
            }
            throw error;
          }
