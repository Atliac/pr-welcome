version: 2

updates:
  # ==============================================================================
  # GitHub Actions Updates
  # Keeps your CI/CD workflows up to date.
  # ==============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly" # Options: "daily", "weekly", "monthly"

    # --- Optional Settings ---
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
