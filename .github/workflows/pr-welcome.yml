name: PR Welcome

on:
  pull_request_target:
    types: [opened]

# Required permissions: issues: write and pull-requests: write for posting PR comments
permissions:
  issues: write
  pull-requests: write

jobs:
  pr-welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      # uses: ./ references the action in the current repository.
      # This is used for local testing. In external repositories,
      # use a versioned ref, e.g.: uses: Atliac/pr-welcome@v1
      - name: PR Welcome
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
